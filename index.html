<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>GanaderoBot</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2D6A4F">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#F7F5F0;--white:#FFFFFF;--surface:#F0EDE6;--border:#E5E0D8;--green:#2D6A4F;--green-l:#52B788;--green-xl:#D8F3DC;--amber:#B5600F;--red:#C1121F;--red-l:#FFE8E8;--blue:#1D6FA4;--blue-l:#E8F4FD;--text:#1A1A1A;--text2:#5A5A5A;--text3:#9A9A9A;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);--nav-h:72px}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--text);display:flex;flex-direction:column}
#keyModal{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal-sheet{background:var(--white);width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:32px 24px 40px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px}
.modal-icon{font-size:40px;text-align:center;margin-bottom:12px}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.5rem;text-align:center;margin-bottom:6px}
.modal-sub{font-size:.85rem;color:var(--text2);text-align:center;margin-bottom:24px;line-height:1.5}
.modal-sub a{color:var(--green);text-decoration:none;font-weight:500}
.modal-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;margin-bottom:12px}
.modal-btn{width:100%;background:var(--green);border:none;border-radius:12px;padding:15px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;color:white;cursor:pointer}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-icon{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.topbar-name{font-family:'DM Serif Display',serif;font-size:1.1rem}
.topbar-status{font-size:.72rem;color:var(--green-l);display:flex;align-items:center;gap:4px;margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green-l);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-sheet{display:flex;align-items:center;gap:6px;background:var(--green-xl);border:none;border-radius:20px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--green);cursor:pointer;text-decoration:none}
.btn-key{width:34px;height:34px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
.stats{display:flex;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;padding:10px 4px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--green);line-height:1}
.stat-l{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.screen.active{display:flex;flex-direction:column}
#chatScreen{padding-bottom:var(--nav-h)}
.messages{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;flex-direction:column;max-width:84%;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.b{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:18px;font-size:.9rem;line-height:1.5;word-break:break-word}
.msg.u .bubble{background:var(--green);color:white;border-bottom-right-radius:4px}
.msg.b .bubble{background:var(--white);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.msg.b .bubble.ok{border-left:3px solid var(--green-l)}
.msg.b .bubble.err{background:var(--red-l);color:var(--red);border-left:3px solid var(--red)}
.mtime{font-size:.62rem;color:var(--text3);margin-top:3px;padding:0 4px}
.rcard{margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:14px}
.tipos-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tipo-lbl{display:flex;align-items:center;gap:5px;cursor:pointer;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.75rem;font-weight:500;user-select:none}
.tipo-lbl input{display:none}
.ck-nacimiento{background:var(--green-xl);border-color:var(--green-l);color:var(--green)}
.ck-vacunacion{background:#F3E8FF;border-color:#C084FC;color:#7E22CE}
.ck-traspaso{background:#FEF3C7;border-color:#F59E0B;color:#92400E}
.ck-muerte{background:var(--red-l);border-color:#FCA5A5;color:var(--red)}
.ck-venta{background:#FFF7ED;border-color:#FB923C;color:#C2410C}
.ck-compra{background:#ECFEFF;border-color:#22D3EE;color:#0E7490}
.ck-peso{background:var(--blue-l);border-color:#7DD3FC;color:var(--blue)}
.ck-tacto{background:#F0FDF4;border-color:#86EFAC;color:#166534}
.ck-sangrado{background:#FFF1F2;border-color:#FDA4AF;color:#9F1239}
.ck-capado{background:#FFF9C4;border-color:#FDE047;color:#713F12}
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.field-lbl{font-size:.72rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;width:70px;flex-shrink:0}
.field-sel,.field-inp{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none;-webkit-appearance:none}
.field-sel{cursor:pointer}
.field-inp-sm{width:100px;flex:none}
.vac-row{display:flex;align-items:center;gap:8px;flex:1}
.vac-chk{display:flex;align-items:center;gap:5px;flex-shrink:0;background:var(--green-xl);border:1.5px solid var(--green-l);border-radius:8px;padding:5px 10px;cursor:pointer}
.vac-chk input{accent-color:var(--green);width:14px;height:14px}
.vac-chk span{font-size:.75rem;font-weight:500;color:var(--green)}
.card-div{height:1px;background:var(--border);margin:10px 0}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.date-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.date-lbl{font-size:.7rem;color:var(--text3);flex-shrink:0}
.date-inp{flex:1;background:transparent;border:none;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--text2);outline:none;min-width:0;border-bottom:1px dashed var(--border)}
.btn-save{background:var(--green);border:none;border-radius:10px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;color:white;cursor:pointer;white-space:nowrap}
.btn-save.saved{background:var(--green-xl);color:var(--green);cursor:default}
.btn-link{font-size:.75rem;color:var(--green);text-decoration:none;white-space:nowrap}
.typing{align-self:flex-start;background:var(--white);border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:4px;align-items:center;box-shadow:var(--shadow)}
.td{width:7px;height:7px;border-radius:50%;background:var(--border);animation:td 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}
.chips-wrap{padding:10px 16px 0;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap}
.chip:active{background:var(--green-xl);border-color:var(--green-l);color:var(--green)}
.input-bar{background:var(--white);border-top:1px solid var(--border);padding:10px 16px 14px;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
#micBtn{width:44px;height:44px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:all .2s}
#micBtn.active{background:#FFE8E8;border-color:#FCA5A5}
#msgInput{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;resize:none;min-height:44px;max-height:110px;overflow-y:auto;line-height:1.4}
#msgInput:focus{border-color:var(--green);background:var(--white)}
#msgInput::placeholder{color:var(--text3)}
#sendBtn{width:44px;height:44px;background:var(--green);border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:white;flex-shrink:0}
#sendBtn:disabled{opacity:.4;cursor:not-allowed}
#regScreen{padding:16px;padding-bottom:calc(var(--nav-h) + 16px);gap:12px}
.reg-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.reg-title{font-family:'DM Serif Display',serif;font-size:1.2rem}
.btn-exp{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;color:var(--text2);cursor:pointer}
.reg-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.reg-empty-icon{font-size:48px;margin-bottom:12px}
.reg-item{background:var(--white);border-radius:14px;padding:14px;box-shadow:var(--shadow);animation:msgIn .2s ease;margin-bottom:10px}
.reg-item-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.reg-tipos{display:flex;flex-wrap:wrap;gap:4px}
.rbadge{font-size:.68rem;font-weight:600;padding:3px 8px;border-radius:6px;text-transform:uppercase}
.rb-nacimiento{background:var(--green-xl);color:var(--green)}.rb-vacunacion{background:#F3E8FF;color:#7E22CE}
.rb-traspaso{background:#FEF3C7;color:#92400E}.rb-muerte{background:var(--red-l);color:var(--red)}
.rb-venta{background:#FFF7ED;color:#C2410C}.rb-compra{background:#ECFEFF;color:#0E7490}
.rb-peso{background:var(--blue-l);color:var(--blue)}.rb-tacto{background:#F0FDF4;color:#166534}
.rb-sangrado{background:#FFF1F2;color:#9F1239}.rb-capado{background:#FFF9C4;color:#713F12}
.rb-default{background:var(--surface);color:var(--text2)}
.reg-date{font-size:.72rem;color:var(--text3);white-space:nowrap}
.reg-details{display:flex;flex-wrap:wrap;gap:6px 12px;font-size:.8rem;color:var(--text2)}
.btn-del{background:var(--red-l);border:1px solid #FCA5A5;border-radius:8px;padding:3px 8px;font-size:.72rem;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:none;cursor:pointer;padding:8px}
.nav-icon{font-size:22px;transition:transform .2s}
.nav-lbl{font-size:.65rem;font-weight:500;color:var(--text3);letter-spacing:.3px}
.nav-btn.active .nav-lbl{color:var(--green);font-weight:600}
.nav-btn.active .nav-icon{transform:scale(1.1)}
</style>
</head>
<body>
<div id="keyModal">
<div class="modal-sheet">
<div class="modal-handle"></div>
<div class="modal-icon">&#x1F404;</div>
<div class="modal-title">GanaderoBot</div>
<div class="modal-sub">Ingresa tu API Key de Anthropic.<br><a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> &#8594; API Keys &#8594; Create Key</div>
<input class="modal-input" type="password" id="keyInput" placeholder="sk-ant-api03-..." />
<button class="modal-btn" id="activarBtn">Activar bot</button>
</div>
</div>
<div id="app" style="display:none">
<div class="topbar">
<div class="topbar-brand">
<div class="topbar-icon">&#x1F404;</div>
<div><div class="topbar-name">GanaderoBot</div><div class="topbar-status"><div class="status-dot"></div> En linea</div></div>
</div>
<div class="topbar-right">
<a class="btn-sheet" href="https://docs.google.com/spreadsheets/d/1gS2awbQ8nZ91jbDc2bOMYsMj4qANzFWoMUqPoUQ4KFc/edit" target="_blank">&#x1F4CA; Planilla</a>
<button class="btn-key" id="keyBtn">&#x1F511;</button>
</div>
</div>
<div class="stats">
<div class="stat"><div class="stat-n" id="stTotal">0</div><div class="stat-l">Hoy</div></div>
<div class="stat"><div class="stat-n" id="stNac">0</div><div class="stat-l">Nacim.</div></div>
<div class="stat"><div class="stat-n" id="stVac">0</div><div class="stat-l">Vacun.</div></div>
<div class="stat"><div class="stat-n" id="stVta">0</div><div class="stat-l">Ventas</div></div>
<div class="stat"><div class="stat-n" id="stMue">0</div><div class="stat-l">Muertes</div></div>
</div>
<div class="screens">
<div class="screen active" id="chatScreen">
<div class="messages" id="msgs"></div>
<div class="chips-wrap"><div class="chips" id="chipsRow"></div></div>
<div class="input-bar"><div class="input-row">
<button id="micBtn">&#x1F3A4;</button>
<textarea id="msgInput" placeholder="Contame que paso hoy..." rows="1"></textarea>
<button id="sendBtn" disabled>&#x27A4;</button>
</div></div>
</div>
<div class="screen" id="regScreen">
<div class="reg-hdr"><div class="reg-title">Registros de hoy</div><button class="btn-exp" id="expBtn">Exportar CSV</button></div>
<div id="regList"><div class="reg-empty"><div class="reg-empty-icon">&#x1F4CB;</div><div>Los registros de hoy aparecen aqui</div></div></div>
</div>
</div>
<div class="bottom-nav">
<button class="nav-btn active" id="navChat"><div class="nav-icon">&#x1F4AC;</div><div class="nav-lbl">CHAT</div></button>
<button class="nav-btn" id="navReg"><div class="nav-icon">&#x1F4CB;</div><div class="nav-lbl">REGISTROS</div></button>
</div>
</div>
<script>
(function(){
var WH='https://script.google.com/macros/s/AKfycbxI5XYdstorBf9-YTfXH74l7Swpzjl3OjJaANbV7_8l1nPMsXW7QJRe6csEpHtcEW8/exec';
var SH='https://docs.google.com/spreadsheets/d/1gS2awbQ8nZ91jbDc2bOMYsMj4qANzFWoMUqPoUQ4KFc/edit';
var POTREROS=['Frente Samuel','Laguna Samuel','Salida Manga Samuel','Atras Manga Samuel','Fondo Samuel','Comedero Samuel','Piquete Samuel','Frente Ruiz','Costado Ruiz','Hugo Ruiz','Centro Ruiz','Fondo Ruiz'];
var RODEOS=['Samuel','Ruiz'];
var TANIM=['Ternero','Terneros','Ternera','Terneras','Vaca','Vacas','Toro','Toros','Novillo','Novillos','Vaquillona','Vaquillonas'];
var SEXOS=['macho','hembra','mixto'];
var TIPOS=['nacimiento','vacunacion','traspaso','muerte','venta','compra','peso','tacto','sangrado','capado'];
var apiKey='',busy=false,msgHistory=[],records=[],cardCount=0,stockActual=[],recognition=null,micActive=false;
var stats={total:0,nac:0,vac:0,vta:0,mue:0};
var SYS='Sos asistente ganadero para Argentina. Responde: REGISTRO: {tipo campos} FIN_REGISTRO CONFIRMACION: frase. STOCK: ';
function activar(){var k=document.getElementById('keyInput').value.trim();var c='';for(var i=0;i<k.length;i++){var x=k.charCodeAt(i);if(x>=32&&x<=126)c+=k[i];}if(!c){alert('Ingresa tu API Key');return;}apiKey=c;localStorage.setItem('gb_key',c);showApp();cargarStock();botMsg('Buenas! Soy tu asistente de campo. Contame que paso y registro todo en Google Sheets.','');}
function showApp(){document.getElementById('keyModal').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('sendBtn').disabled=false;}
function switchScreen(n){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});if(n==='chat'){document.getElementById('chatScreen').classList.add('active');document.getElementById('navChat').classList.add('active');}else{document.getElementById('regScreen').classList.add('active');document.getElementById('navReg').classList.add('active');}}
function cargarStock(){fetch(WH).then(function(r){return r.json();}).then(function(d){if(d.ok)stockActual=d.stock||[];}).catch(function(){});}
function stockStr(){if(!stockActual.length)return 'sin datos';return stockActual.map(function(s){return s.rodeo+'/'+s.tipo_animal+(s.sexo?' '+s.sexo:'')+'/'+s.potrero+':'+s.total;}).join(', ');}
function doSend(){if(busy||!apiKey)return;var el=document.getElementById('msgInput');var text=el.value.trim();if(!text)return;el.value='';autoResize(el);userMsg(text);showTyping();busy=true;document.getElementById('sendBtn').disabled=true;msgHistory.push({role:'user',content:text});fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS+stockStr(),messages:msgHistory})}).then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});}).then(function(res){hideTyping();if(!res.ok){botMsg('Error: '+(res.d.error?res.d.error.message:'Verificar API Key'),'err');return;}var txt=res.d.content.map(function(b){return b.text||'';}).join('');msgHistory.push({role:'assistant',content:txt});parseResp(txt);}).catch(function(e){hideTyping();botMsg('Error de red: '+e.message,'err');}).finally(function(){busy=false;document.getElementById('sendBtn').disabled=false;});}
function parseResp(text){var recs=[];var re=/REGISTRO:\s*(\{[\s\S]*?\})\s*FIN_REGISTRO/g;var m;while((m=re.exec(text))!==null){try{recs.push(JSON.parse(m[1]));}catch(e){}}var cm=text.match(/CONFIRMACION:\s*([\s\S]+)/);var conf=cm?cm[1].replace(/REGISTRO:[\s\S]*/,'').trim():text;var msgEl=addBotMsg(conf.replace(/\n/g,'<br>'),recs.length>0?'ok':'');var bub=msgEl.querySelector('.bubble');for(var i=0;i<recs.length;i++){bub.appendChild(buildCard(recs[i]));updStats(recs[i].tipo);}scrollB();}
function cv(v){if(!v||v==='null'||v==='0'||v===0)return '';return String(v).trim();}
function makeSel(id,opts,val){var v=cv(val).toLowerCase();var el=document.createElement('select');el.className='field-sel';el.id=id;var o0=document.createElement('option');o0.value='';o0.textContent='-- elegir --';el.appendChild(o0);opts.forEach(function(o){var opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o.toLowerCase()===v)opt.selected=true;el.appendChild(opt);});return el;}
function makeRow(lbl,inp){var row=document.createElement('div');row.className='field-row';var l=document.createElement('span');l.className='field-lbl';l.textContent=lbl;row.appendChild(l);row.appendChild(inp);return row;}
function makeInp(id,val,ph,cls){var inp=document.createElement('input');inp.className='field-inp'+(cls?' '+cls:'');inp.id=id;inp.value=cv(val);if(ph)inp.placeholder=ph;return inp;}
function buildCard(r){var id='c'+(++cardCount);var now=nowFull();var ts=(r.tipo||'').toLowerCase().split(',').map(function(t){return t.trim();});var card=document.createElement('div');card.className='rcard';card.id=id;var tGrid=document.createElement('div');tGrid.className='tipos-grid';TIPOS.forEach(function(tev){var isSel=ts.indexOf(tev)>=0;var lbl=document.createElement('label');lbl.className='tipo-lbl'+(isSel?' ck-'+tev:'');var chk=document.createElement('input');chk.type='checkbox';chk.value=tev;chk.checked=isSel;lbl.appendChild(chk);lbl.appendChild(document.createTextNode(tev));(function(l,c,t){l.addEventListener('click',function(){c.checked=!c.checked;l.className='tipo-lbl'+(c.checked?' ck-'+t:'');});})(lbl,chk,tev);tGrid.appendChild(lbl);});card.appendChild(tGrid);card.appendChild(makeRow('Rodeo',makeSel('rodeo_'+id,RODEOS,r.rodeo)));card.appendChild(makeRow('Animal',makeSel('ta_'+id,TANIM,r.tipo_animal)));card.appendChild(makeRow('Sexo',makeSel('sexo_'+id,SEXOS,r.sexo)));card.appendChild(makeRow('Potrero',makeSel('potr_'+id,POTREROS,r.potrero)));card.appendChild(makeRow('Destino',makeSel('dest_'+id,POTREROS,r.destino)));card.appendChild(makeRow('Cantidad',makeInp('cant_'+id,r.cantidad,'','field-inp-sm')));var vRow=document.createElement('div');vRow.className='field-row';var vLbl=document.createElement('span');vLbl.className='field-lbl';vLbl.textContent='Vacuna';var vWrap=document.createElement('div');vWrap.className='vac-row';var vInp=makeInp('vac_'+id,r.vacuna,'nombre vacuna','');var vChkLbl=document.createElement('label');vChkLbl.className='vac-chk';var vChk=document.createElement('input');vChk.type='checkbox';vChk.id='vacchk_'+id;if(r.vacunado===true||r.vacunado==='true')vChk.checked=true;var vSpan=document.createElement('span');vSpan.textContent='Vacunado';vChkLbl.appendChild(vChk);vChkLbl.appendChild(vSpan);vWrap.appendChild(vInp);vWrap.appendChild(vChkLbl);vRow.appendChild(vLbl);vRow.appendChild(vWrap);card.appendChild(vRow);var oRow=document.createElement('div');oRow.className='field-row';oRow.style.alignItems='flex-start';var oLbl=document.createElement('span');oLbl.className='field-lbl';oLbl.style.paddingTop='8px';oLbl.textContent='Obs.';var oTxt=document.createElement('textarea');oTxt.className='field-inp';oTxt.id='obs_'+id;oTxt.placeholder='Estado, enfermedades...';oTxt.style.cssText='min-height:60px;resize:vertical;line-height:1.4';oTxt.value=cv(r.observaciones);oRow.appendChild(oLbl);oRow.appendChild(oTxt);card.appendChild(oRow);card.appendChild(makeRow('Caravana',makeInp('carav_'+id,'','N caravana','')));var cdiv=document.createElement('div');cdiv.className='card-div';card.appendChild(cdiv);var foot=document.createElement('div');foot.className='card-foot';var dw=document.createElement('div');dw.className='date-wrap';var dl=document.createElement('span');dl.className='date-lbl';dl.textContent='Fecha:';var di=document.createElement('input');di.className='date-inp';di.id='fecha_'+id;di.value=now;dw.appendChild(dl);dw.appendChild(di);var sb=document.createElement('button');sb.className='btn-save';sb.id='btn_'+id;sb.textContent='Guardar';(function(cid){sb.addEventListener('click',function(){guardar(cid);});})(id);var vl=document.createElement('a');vl.className='btn-link';vl.href=SH;vl.target='_blank';vl.textContent='Ver planilla';foot.appendChild(dw);foot.appendChild(sb);foot.appendChild(vl);card.appendChild(foot);return card;}
function guardar(id){var card=document.getElementById(id);var chks=card.querySelectorAll('.tipo-lbl input[type=checkbox]');var tipos=[];chks.forEach(function(c){if(c.checked)tipos.push(c.value);});var g=function(eid){var el=document.getElementById(eid);return el?el.value:'';};var gc=function(eid){var el=document.getElementById(eid);return el&&el.checked;};var rec={tipo:tipos.join(', '),rodeo:g('rodeo_'+id),tipo_animal:g('ta_'+id),cantidad:g('cant_'+id),sexo:g('sexo_'+id),potrero:g('potr_'+id),destino:g('dest_'+id),vacuna:g('vac_'+id),vacunado:gc('vacchk_'+id)?'\u2713':'',observaciones:g('obs_'+id),caravana:g('carav_'+id)};var fecha=g('fecha_'+id)||nowFull();addToRegList(rec,fecha,id);toSheets(rec,fecha,function(fila){var b=document.getElementById('del_'+id);if(b)b.setAttribute('data-fila',fila);});var btn=document.getElementById('btn_'+id);if(btn){btn.textContent='\u2713 Guardado';btn.className='btn-save saved';btn.disabled=true;}records.push({r:rec,fecha:fecha});}
function addToRegList(rec,fecha,cardId){var list=document.getElementById('regList');var empty=list.querySelector('.reg-empty');if(empty)empty.remove();var tipos=(rec.tipo||'').split(',').map(function(t){return t.trim();});var item=document.createElement('div');item.className='reg-item';var top=document.createElement('div');top.className='reg-item-top';var badges=document.createElement('div');badges.className='reg-tipos';tipos.forEach(function(t){var b=document.createElement('span');b.className='rbadge rb-'+(t||'default');b.textContent=t;badges.appendChild(b);});var right=document.createElement('div');right.style.cssText='display:flex;align-items:center;gap:8px';var ds=document.createElement('span');ds.className='reg-date';ds.textContent=fecha;var delBtn=document.createElement('button');delBtn.className='btn-del';delBtn.id='del_'+cardId;delBtn.textContent='Borrar';delBtn.setAttribute('data-fila','');(function(el,btn){btn.addEventListener('click',function(){eliminarReg(el,btn);});})(item,delBtn);right.appendChild(ds);right.appendChild(delBtn);top.appendChild(badges);top.appendChild(right);item.appendChild(top);var det=document.createElement('div');det.className='reg-details';if(rec.rodeo){var s1=document.createElement('span');s1.textContent=rec.rodeo;det.appendChild(s1);}if(rec.tipo_animal){var s2=document.createElement('span');s2.textContent=rec.tipo_animal;det.appendChild(s2);}if(rec.cantidad){var s3=document.createElement('span');s3.textContent='# '+rec.cantidad;det.appendChild(s3);}if(rec.potrero){var s4=document.createElement('span');s4.textContent=rec.potrero;det.appendChild(s4);}if(rec.destino){var s5=document.createElement('span');s5.textContent='-> '+rec.destino;det.appendChild(s5);}if(rec.vacuna){var s6=document.createElement('span');s6.textContent=rec.vacuna;det.appendChild(s6);}if(rec.observaciones){var s7=document.createElement('span');s7.style.color='var(--amber)';s7.textContent=rec.observaciones;det.appendChild(s7);}item.appendChild(det);list.insertBefore(item,list.firstChild);}
function eliminarReg(itemEl,btn){var fila=btn.getAttribute('data-fila');if(fila&&confirm('Borrar de la planilla?')){fetch(WH,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accion:'borrar',fila:parseInt(fila)})}).then(function(){cargarStock();}).catch(function(){});}itemEl.style.cssText='opacity:0;transform:translateX(100%);transition:all .3s ease';setTimeout(function(){itemEl.remove();var list=document.getElementById('regList');if(!list.querySelector('.reg-item'))list.innerHTML='Los registros aparecen aqui';},300);}
function toSheets(rec,fecha,cb){var payload=JSON.stringify({fecha:fecha,tipo:rec.tipo,rodeo:rec.rodeo,tipo_animal:rec.tipo_animal,cantidad:rec.cantidad,sexo:rec.sexo,potrero:rec.potrero,destino:rec.destino,vacuna:rec.vacuna,vacunado:rec.vacunado,peso_kg:'',precio_kg:'',observaciones:rec.observaciones||'',caravana:rec.caravana||''});fetch(WH,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:payload}).catch(function(){});setTimeout(function(){cargarStock();},5000);setTimeout(function(){cargarStock();},10000);}
function updStats(tipo){stats.total++;var t=(tipo||'').toLowerCase();if(t.indexOf('nacimiento')>=0)stats.nac++;if(t.indexOf('vacunacion')>=0)stats.vac++;if(t.indexOf('venta')>=0)stats.vta++;if(t.indexOf('muerte')>=0)stats.mue++;document.getElementById('stTotal').textContent=stats.total;document.getElementById('stNac').textContent=stats.nac;document.getElementById('stVac').textContent=stats.vac;document.getElementById('stVta').textContent=stats.vta;document.getElementById('stMue').textContent=stats.mue;}
function exportCSV(){if(!records.length){alert('No hay registros.');return;}var h=['Fecha','Tipo','Rodeo','Tipo Animal','Cantidad','Sexo','Potrero','Destino','Vacuna','Vacunado','Observaciones','Caravana'];var rows=records.map(function(item){var r=item.r;return[item.fecha,r.tipo,r.rodeo,r.tipo_animal,r.cantidad,r.sexo,r.potrero,r.destino,r.vacuna,r.vacunado,r.observaciones,r.caravana].map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');});var csv='\uFEFF'+[h.join(',')].concat(rows).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download='ganaderia_'+new Date().toISOString().slice(0,10)+'.csv';a.click();}
function toggleMic(){if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Usa Chrome para voz.');return;}if(micActive){recognition.stop();return;}var SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();recognition.lang='es-AR';recognition.continuous=false;recognition.interimResults=true;var btn=document.getElementById('micBtn');var inp=document.getElementById('msgInput');recognition.onstart=function(){micActive=true;btn.classList.add('active');btn.textContent='\uD83D\uDD34';};recognition.onresult=function(e){var t='';for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;inp.value=t;autoResize(inp);};recognition.onend=function(){micActive=false;btn.classList.remove('active');btn.textContent='\uD83C\uDFA4';if(inp.value.trim())setTimeout(function(){doSend();},400);};recognition.onerror=function(e){micActive=false;btn.classList.remove('active');btn.textContent='\uD83C\uDFA4';};recognition.start();}
function userMsg(text){var d=document.createElement('div');d.className='msg u';var b=document.createElement('div');b.className='bubble';b.textContent=text;var t=document.createElement('div');t.className='mtime';t.textContent=nowT();d.appendChild(b);d.appendChild(t);document.getElementById('msgs').appendChild(d);scrollB();}
function addBotMsg(html,cls){var d=document.createElement('div');d.className='msg b';var b=document.createElement('div');b.className='bubble'+(cls?' '+cls:'');b.innerHTML=html;var t=document.createElement('div');t.className='mtime';t.textContent=nowT();d.appendChild(b);d.appendChild(t);document.getElementById('msgs').appendChild(d);return d;}
function botMsg(html,cls){addBotMsg(html,cls);scrollB();}
function showTyping(){var d=document.createElement('div');d.className='typing';d.id='typing';for(var i=0;i<3;i++){var td=document.createElement('div');td.className='td';d.appendChild(td);}document.getElementById('msgs').appendChild(d);scrollB();}
function hideTyping(){var t=document.getElementById('typing');if(t)t.remove();}
function scrollB(){var m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function nowT(){return new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});}
function nowFull(){return new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});}

  var sysBase='Sos asistente ganadero experto para Argentina. Interpreta mensajes del campo. Responde con este formato exacto: REGISTRO: {"tipo":"uno o varios por coma: nacimiento|vacunacion|traspaso|muerte|venta|compra|peso|tacto|sangrado|capado","rodeo":"Samuel o Ruiz o vacio","tipo_animal":"Ternero|Ternera|Terneros|Terneras|Vaca|Vacas|Toro|Toros|Novillo|Novillos|Vaquillona|Vaquillonas o vacio","cantidad":0,"sexo":"macho|hembra|mixto o vacio","potrero":"origen o vacio","destino":"destino traslado o vacio","vacuna":"nombre o vacio","vacunado":"true o false","peso_kg":0,"precio_kg":0,"observaciones":"captura automaticamente enfermedades estado sintomas tratamientos"} FIN_REGISTRO CONFIRMACION: frase breve. REGLAS: 1) No uses null, usa vacio o 0. 2) ternero=macho ternera=hembra. 3) SEPARAR POR TIPO ANIMAL: si menciona distintos tipos (ej terneras Y vacas), genera UN REGISTRO por cada tipo. Ejemplo nacieron 3 terneras y 2 vacas = 2 REGISTROS separados. 4) SEPARAR POR RODEO: si son rodeos distintos, registros separados. 5) Mismo tipo animal con multiples eventos = UN SOLO REGISTRO. 6) Si dice todos sin cantidad, usa el numero del STOCK ACTUAL para ese rodeo+tipo_animal+potrero. STOCK ACTUAL: ';
  SYS=sysBase;
});
